<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houbám Zdar - SPA (Proba)</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="top-header">
        <div class="header-left">
            <img src="icons/logo.png" alt="Houbám Zdar" class="header-logo-img">
        </div>
        <div class="header-actions">
            <button class="header-icon-btn" id="header-camera-btn" title="Přidat úlovek">
                <span style="font-size: 1.6rem; line-height: 1;">📷</span>
            </button>
            <button class="header-icon-btn" id="header-profile-btn" title="Profil / Přihlášení">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="header-svg-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
            <button class="menu-toggle" id="menu-toggle-btn" title="Menu">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="header-svg-icon"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </div>
    </header>

    <nav class="side-menu" id="side-menu">
        <div class="widgets-container" id="widgets-container"></div>
    </nav>

    <main class="main-content">
        <div class="enlarged-widget" id="enlarged-widget">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
