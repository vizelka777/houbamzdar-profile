<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie úlovků | Houbam Zdar</title>
    <meta name="description" content="Veřejná galerie všech sdílených houbařských úlovků.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body data-page="gallery" class="page-shell">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Fotografie</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <details id="gallery-overview" class="accordion card">
            <summary class="accordion-summary">
                <p class="accordion-title">Kritéria hledání</p>
            </summary>
            <div class="accordion-body">
                <form id="gallery-filter-form" class="public-capture-filter-form">
                    <div class="public-capture-filter-grid">
                        <label class="public-capture-filter-field">
                            <span>Druh houby</span>
                            <input id="gallery-filter-species" type="search" placeholder="např. hřib smrkový nebo boletus">
                        </label>
                        <label class="public-capture-filter-field">
                            <span>Kraj</span>
                            <input id="gallery-filter-kraj" type="search" placeholder="např. Vysočina">
                        </label>
                        <label class="public-capture-filter-field">
                            <span>Okres</span>
                            <input id="gallery-filter-okres" type="search" placeholder="jen pro sdílené souřadnice">
                        </label>
                        <label class="public-capture-filter-field">
                            <span>Obec</span>
                            <input id="gallery-filter-obec" type="search" placeholder="jen pro sdílené souřadnice">
                        </label>
                        <label class="public-capture-filter-field">
                            <span>Řazení</span>
                            <select id="gallery-filter-sort">
                                <option value="published_desc">Nejnovější zveřejnění</option>
                                <option value="captured_desc">Nejnovější nález</option>
                                <option value="probability_desc">Nejvyšší pravděpodobnost</option>
                                <option value="kraj_asc">Kraje A-Z</option>
                                <option value="okres_asc">Okresy A-Z</option>
                                <option value="obec_asc">Obce A-Z</option>
                            </select>
                        </label>
                    </div>
                    <div class="action-row">
                        <button type="submit" class="btn btn-primary">Použít filtry</button>
                        <button id="gallery-filter-reset" type="button" class="btn btn-secondary">Vymazat</button>
                    </div>
                </form>
                <div id="gallery-moderator-panel" class="moderator-panel" hidden>
                    <label class="public-capture-filter-field moderator-panel-field">
                        <span>Moderátorský AI model</span>
                        <select id="gallery-moderator-model"></select>
                    </label>
                    <p id="gallery-moderator-note" class="muted-copy">
                        Vybraný model se použije pro tlačítko AI recheck u zveřejněných fotografií.
                    </p>
                </div>
                <p id="gallery-summary" class="muted-copy">Načítám fotografie...</p>
            </div>
        </details>

        <div id="gallery-container" class="gallery-grid">
            <p class="muted-copy gallery-grid-status">Načítám fotografie...</p>
        </div>

        <nav id="gallery-pagination" class="server-pagination gallery-pagination" aria-label="Stránkování galerie" hidden></nav>
    </main>

    <div id="gallery-species-modal" class="capture-species-modal" hidden aria-hidden="true">
        <div class="capture-species-modal-backdrop" data-close-species-modal></div>
        <div class="capture-species-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="gallery-species-title">
            <div class="capture-species-modal-head">
                <div>
                    <p class="section-label">Rozpoznané druhy</p>
                    <h2 id="gallery-species-title">Houby na fotografii</h2>
                </div>
                <button id="gallery-species-close" type="button" class="capture-species-modal-close" aria-label="Zavřít okno s druhy">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <p id="gallery-species-meta" class="capture-species-meta"></p>
            <div id="gallery-species-body"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js" defer></script>
    <script src="gallery.js" defer></script>
</body>
</html>
