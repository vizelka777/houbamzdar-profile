<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galerie úlovků | Houbam Zdar</title>
    <meta name="description" content="Veřejná galerie všech sdílených houbařských úlovků.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .gallery-item {
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: var(--surface-color);
            transition: transform 0.2s ease;
        }
        .gallery-item:hover {
            transform: translateY(-4px);
        }
        .gallery-item-header {
            padding: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface-hover);
            border-bottom: 1px solid var(--border-color);
        }
        .gallery-item-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .gallery-item-author {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-color);
        }
        .gallery-item-image {
            position: relative;
            aspect-ratio: 1;
            width: 100%;
            overflow: hidden;
        }
        .gallery-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lightbox modal */
        .lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column;}
        .lightbox.active { display: flex; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 2rem; cursor: pointer; user-select: none; z-index: 1001; }
        .lightbox-content { max-width: 90%; max-height: 80%; object-fit: contain; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 3rem; cursor: pointer; user-select: none; padding: 1rem; z-index: 1001;}
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }
        .lightbox-map-container { width: 90%; height: 200px; max-width: 600px; margin-top: 10px; display: none; border-radius: 8px; z-index: 1001;}
        .lightbox-map-btn { margin-top: 10px; z-index: 1001; }
    </style>
</head>
<body data-page="gallery" class="page-shell">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Fotografie</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <section class="page-intro card" style="margin-bottom: 2rem;">
            <p class="section-label">Galerie</p>
            <h1>Všechny sdílené úlovky</h1>
            <p>
                Prohlédněte si všechny fotografie, které naši houbaři přidali na veřejnou zeď. Veřejné hledání podle `okresu` a `obce`
                funguje jen u snímků, kde autor zpřístupnil souřadnice zdarma.
            </p>
            <form id="gallery-filter-form" class="public-capture-filter-form">
                <div class="public-capture-filter-grid">
                    <label class="public-capture-filter-field">
                        <span>Druh houby</span>
                        <input id="gallery-filter-species" type="search" placeholder="např. hřib smrkový nebo boletus">
                    </label>
                    <label class="public-capture-filter-field">
                        <span>Kraj</span>
                        <input id="gallery-filter-kraj" type="search" placeholder="např. Vysočina">
                    </label>
                    <label class="public-capture-filter-field">
                        <span>Okres</span>
                        <input id="gallery-filter-okres" type="search" placeholder="jen pro sdílené souřadnice">
                    </label>
                    <label class="public-capture-filter-field">
                        <span>Obec</span>
                        <input id="gallery-filter-obec" type="search" placeholder="jen pro sdílené souřadnice">
                    </label>
                    <label class="public-capture-filter-field">
                        <span>Řazení</span>
                        <select id="gallery-filter-sort">
                            <option value="published_desc">Nejnovější zveřejnění</option>
                            <option value="captured_desc">Nejnovější nález</option>
                            <option value="probability_desc">Nejvyšší pravděpodobnost</option>
                            <option value="kraj_asc">Kraje A-Z</option>
                            <option value="okres_asc">Okresy A-Z</option>
                            <option value="obec_asc">Obce A-Z</option>
                        </select>
                    </label>
                </div>
                <div class="action-row">
                    <button type="submit" class="btn btn-primary">Použít filtry</button>
                    <button id="gallery-filter-reset" type="button" class="btn btn-secondary">Vymazat</button>
                </div>
            </form>
            <p id="gallery-summary" class="muted-copy">Načítám fotografie...</p>
        </section>

        <div id="gallery-container" class="gallery-grid">
            <p class="muted-copy" style="grid-column: 1 / -1; text-align: center;">Načítám fotografie...</p>
        </div>

        <div style="text-align: center; margin-top: 2rem; margin-bottom: 2rem;">
            <button id="load-more-gallery-btn" class="btn btn-secondary" style="display: none;">Načíst další fotky</button>
        </div>
    </main>

    <!-- Lightbox pro galerii -->
    <div id="lightbox" class="lightbox">
        <span id="lightbox-close" class="lightbox-close">&times;</span>
        <span id="lightbox-prev" class="lightbox-nav lightbox-prev">&#10094;</span>
        <img id="lightbox-img" class="lightbox-content" src="">
        <span id="lightbox-next" class="lightbox-nav lightbox-next">&#10095;</span>
        <button id="lightbox-map-btn" class="btn btn-primary lightbox-map-btn" style="display: none;">Zobrazit na mapě</button>
        <p id="lightbox-note" class="lightbox-note"></p>
        <div id="lightbox-map" class="lightbox-map-container"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js" defer></script>
    <script src="gallery.js" defer></script>
</body>
</html>
