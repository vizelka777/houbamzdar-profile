<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Můj profil | Houbam Zdar</title>
    <meta name="description" content="Profil uživatele Houbam Zdar.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="me">
    <header>
        <div class="logo"><a href="/">Houbam Zdar</a></div>
        <div id="auth-buttons">
            <!-- Rendered by JS -->
        </div>
    </header>
    <main>
        <h1>Můj profil</h1>

        <div class="profile-card">
            <div id="profile-picture"></div>

            <label for="prof-username">Uživatelské jméno</label>
            <input type="text" id="prof-username" readonly disabled>

            <label for="prof-email">E-mail</label>
            <div class="field-row">
                <input type="email" id="prof-email" readonly disabled>
                <span id="prof-email-status" class="status-badge"></span>
            </div>

            <label for="prof-phone">Telefon</label>
            <div class="field-row">
                <input type="text" id="prof-phone" readonly disabled>
                <span id="prof-phone-status" class="status-badge"></span>
            </div>

            <p class="help-text">
                Tyto údaje spravujete přes
                <a href="https://ahoj420.eu/?mode=login&edit_profile=1&client_host=houbamzdar.cz&return_profile_to=https%3A%2F%2Fhoubamzdar.cz%2Fme.html&return_after_save_to=https%3A%2F%2Fhoubamzdar.cz%2Freauth.html">ahoj420.eu</a>.
            </p>
        </div>

        <div class="about-card">
            <h2>Krátké představení</h2>
            <textarea id="about-me-input" rows="6" maxlength="2000" placeholder="Napište něco o sobě..."></textarea>
            <button id="save-about-btn" class="btn btn-primary">Uložit změny</button>
            <span id="save-status" class="status-message" aria-live="polite"></span>
        </div>
    </main>
    <script src="app.js" defer></script>
</body>
</html>
