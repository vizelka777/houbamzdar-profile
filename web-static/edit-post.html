<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravit publikaci | Houbam Zdar</title>
    <meta name="description" content="Úprava existující publikace v Houbam Zdar.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .post-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .post-textarea { width: 100%; min-height: 150px; padding: 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: inherit; resize: vertical; }
        .post-captures-selector { border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 1rem; background-color: var(--surface-hover); }
        .post-captures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1rem; margin-top: 1rem; max-height: 400px; overflow-y: auto; }
        .post-capture-item { position: relative; border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; aspect-ratio: 1; border: 2px solid transparent; }
        .post-capture-item.selected { border-color: var(--primary-color); }
        .post-capture-item img { width: 100%; height: 100%; object-fit: cover; }
        .post-capture-item .badge { position: absolute; top: 4px; right: 4px; background: var(--primary-color); color: white; border-radius: 50%; width: 24px; height: 24px; display: none; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; }
        .post-capture-item.selected .badge { display: flex; }
    </style>
</head>
<body data-page="edit-post" class="page-shell page-profile">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Úprava obsahu</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <section class="create-post-card card">
            <p class="section-label">Publikace</p>
            <h1>Upravit publikaci</h1>
            
            <form id="edit-post-form" class="post-form">
                <textarea id="post-content" class="post-textarea" placeholder="Co byste chtěli napsat o dnešní houbařské výpravě?" required></textarea>
                
                <div class="post-captures-selector">
                    <h3>Připojit fotografie z archivu</h3>
                    <p class="muted-copy" style="margin-bottom: 0.5rem; font-size: 0.9rem;">Vyberte fotky (max. 9 fotek):</p>
                    <div id="post-captures-grid" class="post-captures-grid">
                        <p class="muted-copy">Načítám fotografie...</p>
                    </div>
                    <div style="margin-top: 1rem; text-align: center;">
                        <button type="button" id="load-more-captures-btn" class="btn btn-secondary" style="display: none;">Načíst další fotky</button>
                    </div>
                </div>

                <p id="post-status" class="status-message" aria-live="polite"></p>

                <div class="link-action-row" style="margin-top: 1rem;">
                    <a href="/public-profile.html" class="btn btn-secondary">Zrušit úpravy</a>
                    <button type="submit" class="btn btn-primary" id="post-submit-btn">Uložit změny</button>
                </div>
            </form>
        </section>
    </main>

    <script src="app.js" defer></script>
    <script src="edit-post.js" defer></script>
</body>
</html>
