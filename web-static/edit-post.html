<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upravit publikaci | Houbam Zdar</title>
    <meta name="description" content="Úprava existující publikace v Houbam Zdar.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/page-editor.css">
</head>
<body data-page="edit-post" class="page-shell page-profile">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Úprava obsahu</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <section class="create-post-card card">
            <p class="section-label">Publikace</p>
            <h1>Upravit publikaci</h1>

            <form id="edit-post-form" class="post-form">
                <textarea id="post-content" class="post-textarea" placeholder="Co byste chtěli napsat o dnešní houbařské výpravě?" required></textarea>

                <div class="post-captures-selector">
                    <h3>Připojit fotografie z archivu</h3>
                    <p class="muted-copy post-selector-help">Vyberte fotky (max. 9 fotek):</p>
                    <div id="post-captures-grid" class="post-captures-grid">
                        <p class="muted-copy">Načítám fotografie...</p>
                    </div>
                    <div class="post-selector-actions">
                        <button type="button" id="load-more-captures-btn" class="btn btn-secondary" style="display: none;">Načíst další fotky</button>
                    </div>
                </div>

                <p id="post-status" class="status-message" aria-live="polite"></p>

                <div class="link-action-row post-form-actions">
                    <a href="/public-profile.html" class="btn btn-secondary">Zrušit úpravy</a>
                    <button type="submit" class="btn btn-primary" id="post-submit-btn">Uložit změny</button>
                </div>
            </form>
        </section>
    </main>

    <script src="app.js" defer></script>
    <script src="edit-post.js" defer></script>
</body>
</html>
