<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zpracování fotek | Houbam Zdar</title>
    <meta name="description" content="Lokální zpracování fotek hub s uložením do IndexedDB a přípravou pro pozdější nahrání.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/page-capture.css">
</head>
<body data-page="capture" class="page-shell page-profile">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Terén</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <div style="text-align: center; margin-bottom: 1rem;">
            <p class="muted-copy" style="font-size: 0.9rem; margin-bottom: 0.25rem;">Uloženo v telefonu: <strong id="capture-total">0</strong></p>
            <p id="capture-status" class="status-message" aria-live="polite" style="margin-top: 0; min-height: 1.5rem;"></p>
        </div>

        <div id="capture-grid" class="capture-grid"></div>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="/server-storage.html" class="btn btn-secondary">Přejít k nahraným fotkám</a>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
    <script src="app.js" defer></script>
    <script src="capture.js" defer></script>
</body>
</html>
