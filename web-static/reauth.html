<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obnovení profilu | Houbam Zdar</title>
    <meta name="description" content="Obnovení profilu po změnách identity v AHOJ420.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reauth">
    <header>
        <div class="logo"><a href="/">Houbam Zdar</a></div>
    </header>
    <main>
        <div class="reauth-container">
            <h1>Změny profilu</h1>
            <p>
                Vaše údaje v AHOJ420 byly upraveny. Přihlaste se znovu, aby se nové informace
                propsaly i do vašeho profilu v Houbam Zdar.
            </p>
            <button id="reauth-btn" class="btn btn-primary btn-large">
                Načíst aktualizovaný profil
            </button>
            <p id="reauth-status" class="status-message" aria-live="polite"></p>
        </div>
    </main>
    <script src="app.js" defer></script>
</body>
</html>
