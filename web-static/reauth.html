<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obnovení profilu | Houbam Zdar</title>
    <meta name="description" content="Obnovení profilu po změnách identity v AHOJ420.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-page="reauth" class="page-shell page-reauth">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Aktualizace účtu</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
    </header>

    <main class="content-main content-main-narrow">
        <section class="reauth-card card">
            <p class="section-label">Synchronizace profilu</p>
            <h1>Změny jsou připravené</h1>
            <p>
                Vaše údaje v AHOJ420 byly upraveny. Pro načtení nových dat do Houbam Zdar
                se prosím znovu přihlaste.
            </p>
            <button id="reauth-btn" class="btn btn-primary btn-large">Načíst aktualizovaný profil</button>
            <p id="reauth-status" class="status-message" aria-live="polite"></p>
        </section>
    </main>

    <script src="app.js" defer></script>
</body>
</html>
