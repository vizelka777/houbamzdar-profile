<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nahrané Fotky | Houbam Zdar</title>
    <meta name="description" content="Nahrané a publikované fotografie uložené na serveru s filtrem podle data, stránkováním a hromadnými akcemi.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/page-capture.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body data-page="server-storage" class="page-shell page-profile">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Archiv</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <section class="page-intro card server-storage-intro">
            <p class="section-label">Nahrané fotografie</p>
            <form id="storage-filter-form" class="server-date-form server-date-form-intro">
                <label class="server-date-field">
                    <span>Od</span>
                    <input id="storage-date-from-input" type="date" class="server-date-input">
                </label>
                <label class="server-date-field">
                    <span>Do</span>
                    <input id="storage-date-to-input" type="date" class="server-date-input">
                </label>
            </form>
        </section>

        <section class="capture-card card">
            <div class="server-filter-row">
                <div class="server-status-toggle" role="tablist" aria-label="Stav fotografií">
                    <button id="storage-toggle-private" type="button" class="server-status-button is-active" data-status="private">Nepublikované</button>
                    <button id="storage-toggle-published" type="button" class="server-status-button" data-status="published">Publikované</button>
                </div>
            </div>

            <div class="server-bulk-bar">
                <label class="capture-select">
                    <input id="storage-select-all" type="checkbox">
                    <span>Vybrat vše na stránce</span>
                </label>
                <strong id="storage-selected-count" class="server-selected-count">Vybráno: 0</strong>
                <div class="server-bulk-actions">
                    <button id="storage-publish-btn" type="button" class="btn btn-secondary">Publikovat</button>
                    <button id="storage-unpublish-btn" type="button" class="btn btn-secondary">Zrušit publikaci</button>
                    <button id="storage-delete-btn" type="button" class="btn btn-secondary">Smazat ze serveru</button>
                </div>
            </div>

            <p id="storage-status" class="status-message" aria-live="polite"></p>

            <div class="server-summary">
                <span id="storage-total-count">Celkem: 0</span>
                <span id="storage-page-indicator">Strana 1 z 1</span>
            </div>
        </section>

        <section class="capture-gallery card">
            <div id="storage-grid" class="capture-grid"></div>

            <div class="server-pagination">
                <button id="storage-prev-btn" type="button" class="btn btn-secondary">Předchozí</button>
                <button id="storage-next-btn" type="button" class="btn btn-secondary">Další</button>
            </div>

            <div class="action-row storage-gallery-footer">
                <a href="/capture.html" class="btn btn-secondary">Zpracování fotek</a>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js" defer></script>
    <script src="server-storage.js" defer></script>
</body>
</html>
