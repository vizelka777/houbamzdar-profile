<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objevujte úlovky | Houbam Zdar</title>
    <meta name="description" content="Veřejná zeď houbařských úlovků a příspěvků.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="vendor/leaflet-markercluster/MarkerCluster.css">
</head>
<body data-page="feed" class="page-shell">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Komunita</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <section class="page-intro card page-intro-spaced">
            <p class="section-label">Veřejná zeď</p>
            <h1>Co se našlo v lese</h1>
            <p>
                Prohlížejte si nejnovější úlovky a příspěvky od ostatních houbařů.
            </p>
        </section>

        <div id="feed-container" class="feed-list">
            <p class="muted-copy feed-list-status">Načítám zeď...</p>
        </div>

        <div class="load-more-row">
            <button id="load-more-feed-btn" class="btn btn-secondary" style="display: none;">Načíst další příspěvky</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="vendor/leaflet-markercluster/leaflet.markercluster.js"></script>
    <script src="map-clusters.js"></script>
    <script src="app.js" defer></script>
    <script src="feed.js" defer></script>
</body>
</html>
