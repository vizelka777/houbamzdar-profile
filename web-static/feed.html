<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objevujte úlovky | Houbam Zdar</title>
    <meta name="description" content="Veřejná zeď houbařských úlovků a příspěvků.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/page-explore.css">
    <link rel="stylesheet" href="styles/page-feed.css">
    <link rel="stylesheet" href="styles/page-map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="vendor/leaflet-markercluster/MarkerCluster.css">
</head>
<body data-page="feed" class="page-shell">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Komunita</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <details id="feed-sort-panel" class="accordion card">
            <summary class="accordion-summary">
                <p class="accordion-title">Řazení publikací</p>
            </summary>
            <div class="accordion-body">
                <form id="feed-sort-form" class="public-capture-filter-form">
                    <div class="public-capture-filter-grid feed-sort-grid">
                        <label class="public-capture-filter-field">
                            <span>Seřadit podle</span>
                            <select id="feed-sort-select">
                                <option value="latest_desc">Nejnovější</option>
                                <option value="likes_desc">Nejvíc lajků</option>
                                <option value="comments_desc">Nejvíc komentářů</option>
                            </select>
                        </label>
                    </div>
                    <div class="action-row">
                        <button type="submit" class="btn btn-primary">Použít řazení</button>
                    </div>
                </form>
                <p class="muted-copy feed-sort-note">Zatím jen pro načtené publikace.</p>
            </div>
        </details>

        <div id="feed-container" class="feed-list">
            <p class="muted-copy feed-list-status">Načítám zeď...</p>
        </div>

        <div class="load-more-row">
            <button id="load-more-feed-btn" class="btn btn-secondary" style="display: none;">Načíst další příspěvky</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="vendor/leaflet-markercluster/leaflet.markercluster.js"></script>
    <script src="map-clusters.js"></script>
    <script src="app.js" defer></script>
    <script src="feed.js" defer></script>
</body>
</html>
