<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa úlovků | Houbam Zdar</title>
    <meta name="description" content="Mapa všech sdílených houbařských úlovků.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #global-map {
            width: 100%;
            height: 600px;
            border-radius: var(--radius-md);
            margin-top: 1.5rem;
            z-index: 1;
        }
        .map-popup-content {
            text-align: center;
        }
        .map-popup-content img {
            max-width: 150px;
            max-height: 150px;
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
        }
        .map-popup-content h4 {
            margin: 0 0 0.2rem;
            font-size: 1rem;
        }
        .map-popup-content p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body data-page="map" class="page-shell">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Mapa</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <section class="page-intro card" style="margin-bottom: 2rem;">
            <p class="section-label">Mapa</p>
            <h1>Místa nálezů</h1>
            <p>
                Prohlédněte si, kde rostou. Mapa ukazuje veřejně sdílené fotografie úlovků od všech houbařů.
            </p>
            <p id="global-map-summary" class="muted-copy">Načítám veřejná místa...</p>
            <div id="global-map"></div>
            <div class="action-row">
                <button id="global-map-load-more-btn" class="btn btn-secondary" style="display: none;">Načíst další body</button>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="app.js" defer></script>
    <script src="map.js" defer></script>
</body>
</html>
