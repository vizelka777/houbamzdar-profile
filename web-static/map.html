<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa úlovků | Houbam Zdar</title>
    <meta name="description" content="Mapa všech sdílených houbařských úlovků.">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/page-explore.css">
    <link rel="stylesheet" href="styles/page-map.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="vendor/leaflet-markercluster/MarkerCluster.css" />
</head>
<body data-page="map" class="page-shell">
    <header class="site-header">
        <a href="/" class="brand-link" aria-label="Houbam Zdar">
            <img src="/logo.png" alt="Logo Houbam Zdar" class="brand-mark">
            <div class="brand-copy">
                <span class="brand-eyebrow">Mapa</span>
                <strong>Houbam Zdar</strong>
            </div>
        </a>
        <div id="auth-buttons" class="header-actions"></div>
    </header>

    <main class="content-main content-main-narrow">
        <details id="global-map-filters" class="accordion card map-filter-accordion">
            <summary class="accordion-summary map-filter-summary">
                <p class="accordion-title">Kritéria hledání</p>
            </summary>
            <div class="accordion-body map-filter-body">
                <form id="global-map-filter-form" class="public-capture-filter-form">
                    <div class="public-capture-filter-grid map-filter-grid">
                        <label class="public-capture-filter-field">
                            <span>Druh houby</span>
                            <input id="global-filter-species" type="search" placeholder="např. hřib smrkový nebo boletus">
                        </label>
                    </div>
                    <div class="action-row">
                        <button type="submit" class="btn btn-primary">Použít filtry</button>
                        <button id="global-map-filter-reset" type="button" class="btn btn-secondary">Vymazat</button>
                    </div>
                </form>
            </div>
        </details>

        <section class="card map-page-card">
            <p id="global-map-summary" class="muted-copy">Načítám veřejná místa...</p>
            <div id="global-map"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="vendor/leaflet-markercluster/leaflet.markercluster.js"></script>
    <script src="map-clusters.js"></script>
    <script src="app.js" defer></script>
    <script src="map.js" defer></script>
</body>
</html>
